name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # vcpkg epingle sur la meme baseline que vcpkg.json pour des builds
      # reproductibles (garantit que le commit de la baseline existe).
      - name: Checkout vcpkg (pinned baseline)
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: dfcb04008a5a9e038a4ae0d1af57909e30d21359
          path: vcpkg

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Set VCPKG_ROOT
        run: echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" >> $env:GITHUB_ENV

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(\d+\.\d+\.\d+.*)$') { $v = $Matches[1] } else { $v = '0.0.0-dev' }
          echo "APP_VERSION=$v" >> $env:GITHUB_ENV
          echo "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version = $v"

      - name: Configure (CMake + vcpkg)
        run: cmake --preset x64-release

      - name: Build (Release)
        run: cmake --build --preset x64-release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$env:APP_VERSION `
            installer\GeminiDesktop.iss

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\GeminiDesktop.exe dist\GeminiDesktop.exe
          Copy-Item installer\Output\GeminiDesktop-Setup.exe dist\GeminiDesktop-Setup.exe
          Get-ChildItem dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gemini-desktop-${{ steps.ver.outputs.version }}
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Gemini Desktop ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/GeminiDesktop.exe
            dist/GeminiDesktop-Setup.exe
